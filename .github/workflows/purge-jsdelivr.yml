name: Purge jsDelivr CDN

on:
  push:
    branches: [main]

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Purge changed files on jsDelivr
        run: |
          REPO="${{ github.repository }}"
          BASE="https://purge.jsdelivr.net/gh/${REPO}@main"

          echo "→ Purging manifest.json (always)"
          curl -fsS "$BASE/manifest.json" -o /dev/null -w "  status=%{http_code} time=%{time_total}s\n" || echo "  manifest purge failed (non-fatal)"

          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '^levels/.*\.json$' || true)
          else
            CHANGED=$(git ls-files 'levels/*.json')
          fi

          if [ -z "$CHANGED" ]; then
            echo "→ No level files changed."
            exit 0
          fi

          echo "$CHANGED" | while read f; do
            echo "→ Purging $f"
            curl -fsS "$BASE/$f" -o /dev/null -w "  status=%{http_code} time=%{time_total}s\n" || echo "  $f purge failed (non-fatal)"
          done
